# render.yaml — deploy RescueAI to Render.com with one click
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: rescue-ai-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://rescue-ai.onrender.com   # update to your frontend URL
      - key: ANTHROPIC_API_KEY
        sync: false   # you'll paste this in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: rescue-ai-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend (built as static site)
  - type: web
    name: rescue-ai-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://rescue-ai-server.onrender.com

databases:
  - name: rescue-ai-db
    plan: free
    databaseName: rescueai
    user: rescueai
